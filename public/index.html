<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSSS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div id="auth-view" class="centerField">
        <h1 id="auth-title"></h1>
        <script src="/js/branding-init.js"></script>
        <small class="auth-subtitle">Using a Cisco Server-sided Scoring System</small>
        <br>

        <div id="login-form">
            <h2>Login</h2>
            <input type="text" id="l-user" placeholder="Username" autocomplete="username">
            <input type="password" id="l-pass" placeholder="Password" autocomplete="current-password">
            <button id="btn-login-submit">Login &gt;&gt;</button>
            <div class="auth-link">
                Don't have an account? <a id="link-show-register">Register</a>
            </div>
        </div>

        <div id="register-form" class="hidden">
            <h2>Register</h2>
            <input type="text" id="r-user" placeholder="Username" autocomplete="username">
            <input type="email" id="r-email" placeholder="Email" autocomplete="email">
            <input type="password" id="r-pass" placeholder="Password" autocomplete="new-password">
            <div class="password-hint">Min 8 characters, 1 uppercase letter, 1 number</div>
            <button id="btn-register-submit">Create Account &gt;&gt;</button>
            <div class="auth-link">
                Already have an account? <a id="link-show-login">Login</a>
            </div>
        </div>

        <div id="auth-error" class="error-msg"></div>
    </div>

    <script type="module" src="js/auth-main.js"></script>
</body>
</html>
