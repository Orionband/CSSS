<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenges</title>
    <link rel="modulepreload" href="/js/state.js">
    <link rel="modulepreload" href="/js/utils.js">
    <link rel="modulepreload" href="/js/nav.js">
    <link rel="modulepreload" href="/js/shell.js">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div id="modal-container" class="modal hidden">
        <div class="modal-content" id="modal-box">
            <span class="modal-close" id="modal-close-btn">&times;</span>
            <div id="modal-inner"></div>
        </div>
    </div>

    <nav class="navBar">
        <a href="/challenges" class="nav-brand navElement" id="nav-brand"></a>
        <div class="nav-links-row" id="nav-links-container"></div>
        <div class="nav-user navElement">
            <span id="uid-display"></span>
            <button type="button" class="logout-btn" id="btn-logout">Logout</button>
        </div>
    </nav>
    <script src="/js/branding-init.js"></script>

    <main class="main-content">
        <div class="content-wrap">
            <div class="page-header">
                <h2>Challenges</h2>
            </div>

            <div class="sub-tabs" id="challenges-tabs">
                <button type="button" class="sub-tab active" data-challenge-tab="labs">Labs</button>
                <button type="button" class="sub-tab" data-challenge-tab="quizzes">Quizzes</button>
            </div>

            <div id="challenges-labs" class="challenges-grid"></div>
            <div id="challenges-quizzes" class="challenges-grid hidden"></div>
        </div>
    </main>

    <script type="module" src="js/page-challenges.js"></script>
</body>
</html>
