<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <nav class="navBar">
        <a href="/challenges" class="nav-brand navElement" id="nav-brand"></a>
        <div class="nav-links-row" id="nav-links-container"></div>
        <div class="nav-user navElement">
            <span id="uid-display"></span>
            <button type="button" class="logout-btn" id="btn-logout">Logout</button>
        </div>
    </nav>
    <script src="/js/branding-init.js"></script>

    <main class="main-content">
        <div class="content-wrap">
            <div class="page-header">
                <h2>Submission History</h2>
                <small>Your Past Submissions</small>
            </div>

            <div id="history-list-panel" class="componentContainer">
                <div id="history-list"></div>
            </div>

            <div id="history-detail" class="componentContainer hidden">
                <div class="panel-header">
                    <div>
                        <h2>Details</h2>
                        <span id="hist-lab" class="text-accent-bold hist-lab-title"></span>
                        <span id="hist-date" class="text-dim-sm"></span>
                    </div>
                    <div id="hist-score" class="score-display"></div>
                </div>
                <div id="hist-checks"></div>
                <button type="button" class="btn-secondary mb-20" id="btn-close-history">&larr; Back</button>
            </div>
        </div>
    </main>

    <script type="module" src="js/page-history.js"></script>
</body>
</html>
